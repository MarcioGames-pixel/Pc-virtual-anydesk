name: Windows VM Docker + Bore

on:
  workflow_dispatch:

jobs:
  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Docker
        run: |
          sudo apt update
          sudo apt install -y docker.io docker-compose wget curl
          sudo systemctl start docker || true
          docker --version

      - name: Baixar docker-compose da VM
        run: |
          mkdir -p dockercomp
          cd dockercomp

          wget -O Win10VLqL.yml \
          https://raw.githubusercontent.com/VLqL069/Win10/7a57fa82a99c1cf3cfaeed17a629d0856061692e/Win10VLqL.yml

          ls -la

      - name: Instalar Bore
        run: |
          wget -O bore.tar.gz https://github.com/ekzhang/bore/releases/latest/download/bore-v0.5.2-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/

      - name: Iniciar Bore
        run: |
          bore local 3389 --to bore.pub &

      - name: Iniciar Windows VM
        run: |
          cd dockercomp

          if command -v docker-compose >/dev/null 2>&1; then
            sudo docker-compose -f Win10VLqL.yml up
          else
            sudo docker compose -f Win10VLqL.yml up
          fi
